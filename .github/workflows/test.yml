name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bash:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check Bash syntax
        run: bash -n mailacl.sh tests/test_mailacl.sh

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Run ShellCheck
        run: shellcheck mailacl.sh tests/test_mailacl.sh

      - name: Run regression tests
        run: bash tests/test_mailacl.sh
